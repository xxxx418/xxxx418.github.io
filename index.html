<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武子淳 ZichunWU - 个人主页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-animation">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
    </div>

    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">武子淳 ZichunWU</div>
                <ul class="nav-menu">
                    <li><a href="#home">首页</a></li>
                    <li><a href="#portfolio">作品</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <div class="hero-content">
                    <div class="avatar-wrapper">
                        <div class="avatar-glow"></div>
                        <img src="assets/profile.jpg" alt="武子淳 ZichunWU" class="profile-img">
                    </div>
                    
                    <div class="hero-text">
                        <h1 class="hero-title">
                            <span class="greeting">你好，我是</span>
                            <span class="name">武子淳</span>
                            <span class="english-name">ZichunWU</span>
                        </h1>
                        
                        <div class="hero-badges">
                            <span class="badge badge-primary">🎓 东南大学吴健雄学院</span>
                            <span class="badge badge-secondary">💻 计算机科学与技术</span>
                            <span class="badge badge-accent">🎂 19岁</span>
                        </div>
                        
                        <p class="hero-description">
                            大一新生，非传统意义程序员，热爱技术与创新。<br>
                            目前专注于 <span class="highlight-text">AI Agent</span> 方向的学习与研究，
                            掌握 Python 和 C++ 语言。
                        </p>
                        
                        <div class="hero-tags">
                            <span class="tag">🤖 AI Agent</span>
                            <span class="tag">📧 younorthend@qq.com</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="portfolio" class="portfolio">
            <div class="container">
                <h2 class="section-title">我的作品</h2>
                <div class="portfolio-empty">
                    <div class="empty-icon">🚧</div>
                    <h3>作品正在建设中...</h3>
                    <p>这里将展示我的项目作品，敬请期待！</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 武子淳 ZichunWU. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
